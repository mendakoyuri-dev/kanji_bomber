<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漢字ボンバー！💣</title>
  <!-- アイコン・PWA -->
  <link rel="icon" href="aicon.png" type="image/png">
  <link rel="apple-touch-icon" href="aicon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="漢字ボンバー">
  <meta name="theme-color" content="#1a1a2e">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Arial Unicode MS', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .card {
      background: #fff; border-radius: 24px; padding: 28px 22px;
      width: 100%; max-width: 460px;
      box-shadow: 0 25px 70px rgba(0,0,0,0.45);
    }
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── START ── */
    .title {
      font-size: 2.1rem; font-weight: 900; text-align: center;
      color: #1a1a2e; letter-spacing: -1px; margin-bottom: 4px;
    }
    .subtitle {
      text-align: center; color: #7f8c8d; font-size: 0.92rem;
      line-height: 1.5; margin-bottom: 18px;
    }
    .rules {
      background: #f8f9fa; border-radius: 14px;
      padding: 12px 16px; margin-bottom: 18px;
    }
    .rule-item { display: flex; gap: 8px; font-size: 0.88rem; color: #555; line-height: 1.7; }
    .section-label { font-size: 0.88rem; color: #7f8c8d; font-weight: 600; margin-bottom: 10px; }
    .radical-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 8px; margin-bottom: 12px;
    }
    .radical-btn {
      background: #fff; border: 2px solid #e0e6ed; border-radius: 12px;
      padding: 10px 4px; cursor: pointer; transition: all 0.16s; font-family: inherit;
    }
    .radical-btn:hover {
      border-color: #3498db; background: #ebf5fb;
      transform: translateY(-2px); box-shadow: 0 4px 12px rgba(52,152,219,0.2);
    }
    .r-char { font-size: 1.5rem; display: block; line-height: 1.3; }
    .r-name { font-size: 0.58rem; color: #95a5a6; display: block; }
    .random-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
      border: none; border-radius: 14px; font-size: 0.95rem;
      font-family: inherit; font-weight: bold; color: white;
      cursor: pointer; transition: all 0.16s;
      box-shadow: 0 4px 16px rgba(253,160,133,0.35);
    }
    .random-btn:hover {
      transform: translateY(-2px); box-shadow: 0 6px 22px rgba(253,160,133,0.5);
    }

    /* ── GAME ── */
    .game-header {
      display: flex; justify-content: space-between;
      align-items: stretch; gap: 8px; margin-bottom: 14px;
    }
    .timer-box {
      background: #fdf2f2; border-radius: 14px;
      padding: 10px 14px; text-align: center; flex: 0 0 auto; min-width: 86px;
    }
    .timer-label { font-size: 0.65rem; color: #e74c3c; font-weight: 700; letter-spacing: 0.5px; }
    .timer-value {
      font-size: 2.5rem; font-weight: 900; color: #e74c3c;
      line-height: 1; font-variant-numeric: tabular-nums;
    }
    @keyframes timer-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    .timer-value.urgent { animation: timer-pulse 0.45s infinite; color: #c0392b; }
    .theme-box {
      background: #f8f9fa; border-radius: 14px; padding: 10px; text-align: center;
      flex: 1; display: flex; flex-direction: column; justify-content: center;
    }
    .theme-label { font-size: 0.65rem; color: #95a5a6; margin-bottom: 2px; }
    .theme-char { font-size: 2.6rem; font-weight: 900; color: #1a1a2e; line-height: 1.1; }
    .theme-name { font-size: 0.7rem; color: #7f8c8d; }
    .score-box {
      background: #e8f8f5; border-radius: 14px;
      padding: 10px 14px; text-align: center; flex: 0 0 auto; min-width: 86px;
    }
    .score-label { font-size: 0.65rem; color: #27ae60; font-weight: 700; letter-spacing: 0.5px; }
    .score-value { font-size: 2.5rem; font-weight: 900; color: #27ae60; line-height: 1; }
    .divider { height: 1px; background: #eee; margin: 12px 0; }
    .input-row { display: flex; gap: 8px; margin-bottom: 6px; }
    .kanji-input {
      flex: 1; font-size: 1.6rem; padding: 10px 14px;
      border: 3px solid #3498db; border-radius: 14px; font-family: inherit;
      text-align: center; outline: none; background: #fff;
      transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
    }
    .kanji-input:focus { border-color: #2980b9; box-shadow: 0 0 0 4px rgba(52,152,219,0.15); }
    .kanji-input.ok { border-color: #27ae60; background: #eafaf1; }
    .kanji-input.ng { border-color: #e74c3c; background: #fdf2f2; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)}
      40%{transform:translateX(7px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
    }
    .kanji-input.shaking { animation: shake 0.35s; }
    .submit-btn {
      padding: 10px 16px; background: #3498db; border: none; border-radius: 14px;
      color: #fff; font-size: 1rem; font-family: inherit; font-weight: bold;
      cursor: pointer; transition: background 0.16s; white-space: nowrap;
    }
    .submit-btn:hover { background: #2980b9; }
    .feedback { font-size: 0.88rem; min-height: 20px; margin-bottom: 8px; text-align: center; font-weight: 600; }
    .feedback.ok { color: #27ae60; }
    .feedback.ng { color: #e74c3c; }
    .found-header { font-size: 0.78rem; color: #95a5a6; margin-bottom: 6px; }
    .found-list {
      display: flex; flex-wrap: wrap; gap: 6px;
      min-height: 38px; max-height: 130px; overflow-y: auto;
      padding: 8px; background: #f8f9fa; border-radius: 12px;
    }
    .found-list::-webkit-scrollbar { width: 4px; }
    .found-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
    .found-tag {
      background: #3498db; color: #fff; padding: 3px 12px;
      border-radius: 20px; font-size: 1.05rem; font-weight: bold;
    }
    @keyframes pop {
      0%{transform:scale(0);opacity:0} 65%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1}
    }
    .found-tag.popin { animation: pop 0.3s cubic-bezier(0.175,0.885,0.32,1.275) both; }

    /* ── RESULT ── */
    .result-top { text-align: center; margin-bottom: 14px; }
    .result-emoji { font-size: 2.8rem; }
    .result-label { font-size: 1.25rem; font-weight: bold; color: #1a1a2e; margin-top: 2px; }
    .score-big { font-size: 5rem; font-weight: 900; color: #1a1a2e; line-height: 1; }
    .score-big-sub { color: #7f8c8d; font-size: 1.05rem; margin-bottom: 14px; }
    .rank-badge {
      background: #eaf2f8; border-radius: 14px; padding: 12px 18px; margin-bottom: 14px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .rank-badge-label { font-size: 0.82rem; color: #7f8c8d; }
    .rank-badge-text { font-size: 1.1rem; font-weight: bold; color: #2980b9; }
    .result-found-section { margin-bottom: 14px; }
    .result-found-label { font-size: 0.82rem; color: #555; font-weight: 600; margin-bottom: 8px; }
    .result-found-grid {
      display: flex; flex-wrap: wrap; gap: 7px;
      padding: 10px; background: #f8f9fa; border-radius: 12px; min-height: 42px;
    }
    .found-chip {
      background: #3498db; color: white; border-radius: 20px;
      padding: 4px 14px; font-size: 1.05rem; font-weight: bold;
      display: inline-block;
    }

    /* ── MISSED KANJI ── */
    .result-missed-section { margin-bottom: 14px; }
    .result-missed-label { font-size: 0.82rem; color: #555; font-weight: 600; margin-bottom: 8px; }
    .result-missed-grid {
      display: flex; flex-wrap: wrap; gap: 7px;
      padding: 10px; background: #fdfaf3; border-radius: 12px;
      max-height: 160px; overflow-y: auto;
      border: 1.5px solid #f0e6c8;
    }
    .result-missed-grid::-webkit-scrollbar { width: 4px; }
    .result-missed-grid::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
    .missed-chip {
      background: #fef9ec; color: #7d6608; border: 1.5px solid #f0d060;
      border-radius: 20px; padding: 4px 14px; font-size: 1.05rem; font-weight: bold;
      display: inline-block;
    }
    .missed-count-badge {
      font-size: 0.75rem; color: #a08040; background: #fef3c7;
      border-radius: 10px; padding: 1px 7px; margin-left: 6px; font-weight: normal;
    }

    .hs-box {
      background: #f8f9fa; border-radius: 14px;
      padding: 14px 16px; margin-bottom: 14px; text-align: left;
    }
    .hs-title { font-size: 0.85rem; font-weight: bold; color: #555; margin-bottom: 10px; }
    .hs-row {
      display: flex; align-items: center; padding: 5px 0;
      font-size: 0.9rem; border-bottom: 1px solid #eee;
    }
    .hs-row:last-child { border-bottom: none; }
    .hs-medal { width: 26px; font-size: 1.05rem; }
    .hs-score { margin-left: auto; font-weight: bold; color: #2980b9; }
    .hs-new {
      background: #ffd700; color: #333; font-size: 0.68rem;
      font-weight: bold; padding: 1px 6px; border-radius: 8px; margin-left: 6px;
    }
    .play-again-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none; border-radius: 14px; font-size: 1.05rem;
      font-family: inherit; font-weight: bold; color: #fff;
      cursor: pointer; transition: all 0.16s;
      box-shadow: 0 4px 16px rgba(102,126,234,0.35);
    }
    .play-again-btn:hover {
      transform: translateY(-2px); box-shadow: 0 6px 22px rgba(102,126,234,0.5);
    }


    /* ════════════════════════════════════════════
       モバイル対応
       ════════════════════════════════════════════ */

    /* ダブルタップズーム防止・ネイティブタップ感 */
    button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    input  { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

    /* カード：コンテンツ多い時もスクロールできるように */
    .card {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* モーダル：スマホでもスクロール可能に */
    .modal-card {
      overflow-y: auto;
      max-height: 88dvh;
      max-height: 88vh; /* フォールバック */
    }

    /* ── スマホ全般 (〜500px) ── */
    @media (max-width: 500px) {
      body {
        align-items: flex-start;   /* キーボード出現時も上から詰める */
        padding: 10px;
        min-height: 100dvh;
        min-height: 100vh;         /* dvh 非対応ブラウザ向けフォールバック */
      }
      .card {
        padding: 18px 14px;
        border-radius: 18px;
        max-height: calc(100dvh - 20px);
        max-height: calc(100vh - 20px);
      }

      /* スタートページ */
      .title    { font-size: 1.75rem; }
      .subtitle { font-size: 0.83rem; margin-bottom: 14px; }
      .rules    { padding: 10px 12px; margin-bottom: 14px; }
      .rule-item { font-size: 0.83rem; }
      .radical-btn { padding: 8px 3px; border-radius: 10px; }
      .r-char  { font-size: 1.25rem; }
      .r-name  { font-size: 0.54rem; }
      .radical-grid { gap: 6px; margin-bottom: 10px; }
      .random-btn { padding: 12px; font-size: 0.88rem; }

      /* ゲーム画面 */
      .game-header { gap: 5px; margin-bottom: 10px; }
      .timer-box, .score-box { min-width: 68px; padding: 8px 8px; }
      .timer-value, .score-value { font-size: 2rem; }
      .timer-label, .score-label { font-size: 0.6rem; }
      .theme-char  { font-size: 2rem; }
      .theme-name  { font-size: 0.62rem; }
      .theme-box   { padding: 8px 6px; }
      .kanji-input { font-size: 1.4rem; padding: 9px 10px; }
      .submit-btn  { padding: 10px 12px; font-size: 0.88rem; min-width: 58px; border-radius: 12px; }
      .found-list  { max-height: 88px; padding: 6px; }
      .found-header { font-size: 0.72rem; }
      .found-tag   { font-size: 0.95rem; padding: 2px 10px; }
      .feedback    { font-size: 0.82rem; }

      /* 結果画面 */
      .score-big   { font-size: 3.8rem; }
      .result-label { font-size: 1.1rem; }
      .result-emoji { font-size: 2.4rem; }
      .rank-badge  { padding: 10px 14px; margin-bottom: 12px; }
      .result-found-grid  { max-height: 100px; }
      .result-missed-grid { max-height: 100px; }
      .found-chip, .missed-chip { font-size: 0.95rem; padding: 3px 11px; }
      .hs-box      { padding: 12px 12px; }
      .play-again-btn { padding: 15px; font-size: 1rem; }

      /* モーダル */
      .modal-card { padding: 22px 18px 16px; border-radius: 20px; }
      .modal-kanji { font-size: 4rem; }
    }

    /* ── 極小スマホ (〜360px) ── */
    @media (max-width: 360px) {
      .radical-grid { grid-template-columns: repeat(4, 1fr); gap: 5px; }
      .r-char { font-size: 1.1rem; }
      .timer-value, .score-value { font-size: 1.75rem; }
      .theme-char { font-size: 1.75rem; }
      .timer-box, .score-box { min-width: 60px; }
      .kanji-input { font-size: 1.25rem; }
    }

    /* iPhone ノッチ・ダイナミックアイランド・ホームバー対応 */
    @supports (padding: max(0px)) {
      body {
        padding-top:    max(14px, env(safe-area-inset-top));
        padding-left:   max(10px, env(safe-area-inset-left));
        padding-right:  max(10px, env(safe-area-inset-right));
        padding-bottom: max(10px, env(safe-area-inset-bottom));
      }
    }

    /* キーボード表示中：ヘッダーをギュッとコンパクトに */
    .kb-open .game-header { gap: 4px; margin-bottom: 6px; }
    .kb-open .timer-box,
    .kb-open .score-box   { padding: 5px 8px; min-width: 62px; }
    .kb-open .timer-value,
    .kb-open .score-value { font-size: 1.7rem; }
    .kb-open .timer-label,
    .kb-open .score-label { font-size: 0.56rem; }
    .kb-open .theme-box   { padding: 5px 6px; }
    .kb-open .theme-char  { font-size: 1.7rem; }
    .kb-open .theme-name  { display: none; }
    .kb-open .divider     { margin: 6px 0; }
    .kb-open .feedback    { margin-bottom: 4px; font-size: 0.8rem; min-height: 14px; }
    .kb-open .found-header { display: none; }
    .kb-open .found-list  { max-height: 52px; padding: 5px 8px; }
  </style>
</head>
<body>

<div class="card">
  <!-- START -->
  <div id="screen-start" class="screen active">
    <div class="title">漢字ボンバー！💣</div>
    <div class="subtitle">制限時間60秒！部首の漢字を限界まで絞り出せ！</div>
    <div class="rules">
      <div class="rule-item"><span>📖</span><span>お題となる「部首」を選んでスタートしてね。</span></div>
      <div class="rule-item"><span>⌨️</span><span>覚えている漢字を入力して Enter キーを押そう！</span></div>
      <div class="rule-item"><span>⚠️</span><span>同じ漢字は1回しか使えないよ。</span></div>
    </div>
    <div class="section-label">挑戦する部首を選んでね：</div>
    <div class="radical-grid" id="radical-grid"></div>
    <button class="random-btn" id="btn-random">🎲 迷ったらコレ！ランダムで選ぶ</button>
  </div>

  <!-- GAME -->
  <div id="screen-game" class="screen">
    <div class="game-header">
      <div class="timer-box">
        <div class="timer-label">のこり</div>
        <div class="timer-value" id="timer-val">60</div>
      </div>
      <div class="theme-box">
        <div class="theme-label">今回のお題</div>
        <div class="theme-char" id="theme-char">ー</div>
        <div class="theme-name" id="theme-name"></div>
      </div>
      <div class="score-box">
        <div class="score-label">スコア</div>
        <div class="score-value" id="score-val">0</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="input-row">
      <input id="kanji-input" class="kanji-input" type="text"
             placeholder="漢字を入力…"
             inputmode="text" enterkeyhint="send"
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="submit-btn" id="btn-submit">送信</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="found-header">見つけた漢字（重複チェックあり）：</div>
    <div class="found-list" id="found-list"></div>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen">
    <div class="result-top">
      <div class="result-emoji">💥</div>
      <div class="result-label">タイムアップ！</div>
    </div>
    <div style="text-align:center;">
      <div class="score-big" id="res-score">0</div>
      <div class="score-big-sub">個正解</div>
    </div>
    <div class="rank-badge">
      <span class="rank-badge-label">称号：</span>
      <span class="rank-badge-text" id="res-rank">ー</span>
    </div>
    <div class="result-found-section">
      <div class="result-found-label">✅ あなたが見つけた漢字</div>
      <div class="result-found-grid" id="result-found-grid"></div>
    </div>
    <div class="result-missed-section">
      <div class="result-missed-label" id="result-missed-label">📖 他にもあった漢字<span class="missed-count-badge" id="missed-count-badge"></span></div>
      <div class="result-missed-grid" id="result-missed-grid"></div>
    </div>
    <div class="hs-box">
      <div class="hs-title">🏆 この部首のハイスコア TOP3</div>
      <div id="hs-list"></div>
    </div>
    <button class="play-again-btn" id="btn-again">もう一度あそぶ</button>
  </div>
</div>


<script>
// ════════════════════════════════════════════════════
// 漢字データベース（漢字ペディア 部首索引より）
// ════════════════════════════════════════════════════
function makeSet(str) {
  return new Set(str.trim().split(/\s+/));
}

const RADICALS = [
  {
    char: '氵', label: '水', name: 'さんずい',
    // 漢字ペディア 水部（部首番号85）
    kanji: makeSet(`水 永 氷 求 汁 汀 氾 汚 汗 江 汞 汕 汝 汐 池 汎 汪 汽 沂 汲 決 沍 沙 沚 沁 汰 沢 沖 沈 沌 沛 泛 汨 没 沐 沃 泳 沿 泓 河 泣 況 沽 泗 治 泅 沮 沼 泄 泉 泝 沱 泰 注 泥 沾 波 泊 泌 泯 沸 法 泡 沫 油 泪 洟 洩 海 活 洶 洫 洪 洽 洸 洒 洲 洵 浄 津 浅 洗 洞 派 洋 洛 洌 浦 浣 涓 浩 浚 消 浹 涉 浸 浙 涎 涕 涅 浜 浮 涌 浴 浬 流 涙 浪 淫 液 淹 涯 渇 涵 渓 涸 淆 混 済 淬 渋 淑 淳 渚 渉 淌 深 清 淒 淅 淙 淡 添 淀 淘 涼 淋 淪 渥 渭 淵 湲 温 渦 渙 渠 減 湖 港 渾 渣 滋 湿 湫 湘 渫 湊 測 湛 湍 渟 渡 湯 湃 渺 湎 満 渝 湧 游 溂 湾 溢 滑 漢 源 溝 溘 滉 溷 滓 溲 準 溽 滄 滞 滝 溺 滔 溏 漠 溥 滂 溟 滅 溶 溜 演 漁 滸 滾 漆 漿 滲 漸 漕 漱 漲 漬 滴 滌 漂 漫 漾 漓 漣 滷 漏 漉 潰 漑 潟 澗 澆 潔 潸 潤 潯 潜 潺 潮 澄 潑 潘 澎 潦 澳 澣 激 澡 濁 澹 澱 濃 濛 澪 濠 濡 濬 濯 濔 濤 濘 瀉 瀋 濺 瀆 瀑 瀁 濫 瀏 濾 瀚 瀟 瀬 瀞 瀦 瀕 瀝 灌 瀰 瀾 瀲 灑 灘`)
  },

// RANKS
// ════════════════════════════════════════════
const RANKS = [
  { min: 0,  label: '😢 漢字ゼロ段' },
  { min: 1,  label: '📚 漢字見習い' },
  { min: 4,  label: '✏️ 漢字修行中' },
  { min: 8,  label: '🌟 漢字の達人' },
  { min: 13, label: '🎓 漢字博士' },
  { min: 18, label: '⚡ 漢字の神' },
  { min: 24, label: '👹 漢字の鬼' },
];
function getRank(score) {
  let r = RANKS[0];
  for (const e of RANKS) { if (score >= e.min) r = e; }
  return r.label;
}

// ════════════════════════════════════════════
// HIGH SCORES
// ════════════════════════════════════════════
function loadScores(char) {
  try { return JSON.parse(localStorage.getItem('kb_' + char)) || []; } catch { return []; }
}
function saveAndGetScores(char, score) {
  let arr = [score, ...loadScores(char)].sort((a, b) => b - a).slice(0, 3);
  try { localStorage.setItem('kb_' + char, JSON.stringify(arr)); } catch {}
  return arr;
}

// ════════════════════════════════════════════
// STATE & DOM
// ════════════════════════════════════════════
let g = { timeLeft: 0, score: 0, found: new Set(), interval: null, composing: false, radical: null };
const $ = id => document.getElementById(id);

function showScreen(name) {
  ['start', 'game', 'result'].forEach(s => {
    $('screen-' + s).classList.toggle('active', s === name);
  });
}

// ════════════════════════════════════════════
// RADICAL GRID
// ════════════════════════════════════════════
function buildGrid() {
  const grid = $('radical-grid');
  RADICALS.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'radical-btn';
    btn.innerHTML = `<span class="r-char">${r.char}</span><span class="r-name">${r.label}</span>`;
    btn.addEventListener('click', () => startGame(r));
    grid.appendChild(btn);
  });
}
$('btn-random').addEventListener('click', () => {
  startGame(RADICALS[Math.floor(Math.random() * RADICALS.length)]);
});

// ════════════════════════════════════════════
// GAME
// ════════════════════════════════════════════
function startGame(radical) {
  if (g.interval) clearInterval(g.interval);
  g = { timeLeft: 60, score: 0, found: new Set(), interval: null, composing: false, radical };

  $('theme-char').textContent = radical.char;
  $('theme-name').textContent = radical.name;
  $('score-val').textContent = '0';
  $('timer-val').textContent = '60';
  $('timer-val').classList.remove('urgent');
  $('found-list').innerHTML = '';
  $('feedback').textContent = '';
  $('feedback').className = 'feedback';

  const inp = $('kanji-input');
  inp.value = ''; inp.className = 'kanji-input';

  showScreen('game');
  setTimeout(() => inp.focus(), 80);
  g.interval = setInterval(tick, 1000);
}

function tick() {
  g.timeLeft--;
  const el = $('timer-val');
  el.textContent = g.timeLeft;
  if (g.timeLeft <= 10) el.classList.add('urgent');
  if (g.timeLeft <= 0) endGame();
}

// ════════════════════════════════════════════
// SUBMIT
// ════════════════════════════════════════════
function trySubmit() {
  const inp = $('kanji-input');
  const raw = inp.value.trim();
  if (!raw) return;

  let char = '';
  for (const c of raw) {
    const cp = c.codePointAt(0);
    if ((cp >= 0x4E00 && cp <= 0x9FFF) || (cp >= 0x3400 && cp <= 0x4DBF) ||
        (cp >= 0xF900 && cp <= 0xFAFF) || (cp >= 0x20000 && cp <= 0x2A6DF)) {
      char = c; break;
    }
  }
  if (!char) char = [...raw][0];
  inp.value = '';

  if (g.found.has(char)) {
    feedback('ng', `「${char}」はもう使ったよ！`);
    doShake(inp); return;
  }
  if (!g.radical.kanji.has(char)) {
    const cp = char.codePointAt(0);
    const isKanji = (cp >= 0x4E00 && cp <= 0x9FFF) || (cp >= 0x3400 && cp <= 0x4DBF);
    feedback('ng', isKanji ? `「${char}」はこの部首の漢字じゃないかも…` : '漢字を入力してね！');
    doShake(inp); return;
  }

  g.found.add(char);
  g.score++;
  $('score-val').textContent = g.score;

  const tag = document.createElement('span');
  tag.className = 'found-tag popin';
  tag.textContent = char;
  const list = $('found-list');
  list.appendChild(tag);
  list.scrollTop = list.scrollHeight;

  feedback('ok', `「${char}」正解！✨`);
  inp.classList.add('ok');
  setTimeout(() => inp.classList.remove('ok'), 500);
}

let fbTimer = null;
function feedback(type, msg) {
  const el = $('feedback');
  el.textContent = msg; el.className = 'feedback ' + type;
  clearTimeout(fbTimer);
  fbTimer = setTimeout(() => { el.textContent = ''; el.className = 'feedback'; }, 1300);
}
function doShake(el) {
  el.classList.remove('shaking', 'ng'); void el.offsetWidth;
  el.classList.add('ng', 'shaking');
  setTimeout(() => el.classList.remove('ng', 'shaking'), 400);
}

// ════════════════════════════════════════════
// INPUT EVENTS
// ════════════════════════════════════════════
const inp = $('kanji-input');
inp.addEventListener('compositionstart', () => { g.composing = true; });
inp.addEventListener('compositionend',   () => { g.composing = false; });
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !g.composing && g.timeLeft > 0) { e.preventDefault(); trySubmit(); }
});
$('btn-submit').addEventListener('click', () => { if (g.timeLeft > 0) trySubmit(); });

// ════════════════════════════════════════════
// END GAME
// ════════════════════════════════════════════
function endGame() {
  clearInterval(g.interval);
  g.interval = null;

  const scores = saveAndGetScores(g.radical.char, g.score);
  $('res-score').textContent = g.score;
  $('res-rank').textContent = getRank(g.score);

  const grid = $('result-found-grid');
  grid.innerHTML = '';
  const foundArr = [...g.found];
  if (foundArr.length === 0) {
    grid.innerHTML = '<span style="color:#95a5a6;font-size:0.85rem;">（なし）</span>';
  } else {
    foundArr.forEach(char => {
      const chip = document.createElement('span');
      chip.className = 'found-chip';
      chip.textContent = char;
      grid.appendChild(chip);
    });
  }

  // ── 答えられなかった漢字 ──
  const missedGrid = $('result-missed-grid');
  missedGrid.innerHTML = '';
  const allKanji = [...g.radical.kanji];
  const missed = allKanji.filter(c => !g.found.has(c));
  if (missed.length === 0) {
    missedGrid.innerHTML = '<span style="color:#27ae60;font-size:0.88rem;font-weight:bold;">🎉 全部見つけた！パーフェクト！</span>';
    $('missed-count-badge').textContent = '';
    $('result-missed-label').style.color = '#27ae60';
  } else {
    $('missed-count-badge').textContent = missed.length + '個';
    $('result-missed-label').style.color = '';
    missed.forEach(char => {
      const chip = document.createElement('span');
      chip.className = 'missed-chip';
      chip.textContent = char;
      missedGrid.appendChild(chip);
    });
  }

  const medals = ['🥇', '🥈', '🥉'];
  const list = $('hs-list');
  list.innerHTML = '';
  let markedNew = false;
  scores.forEach((s, i) => {
    const isNew = !markedNew && s === g.score;
    if (isNew) markedNew = true;
    const row = document.createElement('div');
    row.className = 'hs-row';
    row.innerHTML =
      `<span class="hs-medal">${medals[i] || (i + 1) + '位'}</span>` +
      `<span>${isNew ? '<strong>今回！</strong>' : 'ハイスコア'}</span>` +
      (isNew ? '<span class="hs-new">NEW</span>' : '') +
      `<span class="hs-score">${s}個</span>`;
    list.appendChild(row);
  });

  showScreen('result');
}

$('btn-again').addEventListener('click', () => showScreen('start'));

buildGrid();

// ════════════════════════════════════════════
// PWA：Service Worker 登録

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ════════════════════════════════════════════
// モバイル：キーボード開閉でコンパクトモード切替
// ════════════════════════════════════════════
if (window.visualViewport) {
  const onViewportResize = () => {
    // 画面高の70%未満になったらキーボードが出ていると判断
    const ratio = window.visualViewport.height / window.screen.height;
    document.body.classList.toggle('kb-open', ratio < 0.72);
  };
  window.visualViewport.addEventListener('resize', onViewportResize);
}
